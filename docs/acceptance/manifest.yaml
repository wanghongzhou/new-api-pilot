  F08:
    path: "testdata/design/f08-model-catalog.json"
    purpose: "model catalog pagination, channel coverage mapping, exact missing models and privacy boundary"

  F09:
    path: "testdata/design/f09-subscription-plans.json"
    purpose: "safe subscription plan catalog, complete snapshot and privacy boundary"

  F10:
    path: "testdata/design/f10-pricing-groups.json"
    purpose: "safe pricing and configured group catalogs, exact decimals, completeness and read-only parity boundary"

  F11:
    path: "testdata/design/f11-system-tasks.json"
    purpose: "safe system-task list/current monitoring, typed projection, completeness, retention and read-only boundary"

