services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-docker.m.daocloud.io/oven/bun:1.3.13-alpine}
        GO_IMAGE: ${GO_IMAGE:-docker.m.daocloud.io/library/golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-docker.m.daocloud.io/library/alpine:3.22}
        GO_MODULE_PROXY: ${GO_MODULE_PROXY:-https://goproxy.cn,https://mirrors.aliyun.com/goproxy/,direct}
        GO_SUM_DATABASE: ${GO_SUM_DATABASE:-sum.golang.google.cn}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirrors.aliyun.com/alpine}
    image: ${API_IMAGE:-new-api-pilot:local}
    container_name: new-api-pilot-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      APP_ENV: production
      PORT: '3000'
      DATABASE_DSN: ${DATABASE_DSN:?DATABASE_DSN is required}
      REDIS_DSN: ${REDIS_DSN:?REDIS_DSN is required}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TIMEOUT_SECONDS: ${REDIS_TIMEOUT_SECONDS:-2}
      SQL_MAX_IDLE_CONNS: ${SQL_MAX_IDLE_CONNS:-20}
      SQL_MAX_OPEN_CONNS: ${SQL_MAX_OPEN_CONNS:-100}
      SQL_MAX_LIFETIME_SECONDS: ${SQL_MAX_LIFETIME_SECONDS:-60}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      PLATFORM_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:-}
      SESSION_COOKIE_SECURE: 'true'
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN is required}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      UPSTREAM_CA_FILE: ${UPSTREAM_CA_FILE:-}
      DINGTALK_ALLOWED_HOSTS: ${DINGTALK_ALLOWED_HOSTS:-}
      METRICS_ALLOWED_CIDRS: ${METRICS_ALLOWED_CIDRS:?METRICS_ALLOWED_CIDRS is required}
    volumes:
      - pilot_exports:/data/exports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pilot-network

  mysql:
    image: ${MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.4}
    container_name: new-api-pilot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-new_api_pilot}
      MYSQL_USER: ${MYSQL_USER:-pilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --transaction-isolation=READ-COMMITTED
    volumes:
      - pilot_mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - pilot-network

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: new-api-pilot-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:?REDIS_PASSWORD is required}']
    volumes:
      - pilot_redis:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - pilot-network

volumes:
  pilot_exports:
  pilot_mysql:
  pilot_redis:

networks:
  pilot-network:
    driver: bridge
