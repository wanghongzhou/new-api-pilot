name: new-api-pilot-dev

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        GO_IMAGE: ${GO_IMAGE:-docker.m.daocloud.io/library/golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-docker.m.daocloud.io/library/alpine:3.22}
        GO_MODULE_PROXY: ${GO_MODULE_PROXY:-https://goproxy.cn,https://mirrors.aliyun.com/goproxy/,direct}
        GO_SUM_DATABASE: ${GO_SUM_DATABASE:-sum.golang.google.cn}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirrors.aliyun.com/alpine}
    image: new-api-pilot-dev:local
    container_name: new-api-pilot-dev-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      APP_ENV: development
      PORT: '3000'
      DATABASE_DSN: pilot:pilot@tcp(mysql:3306)/new_api_pilot?charset=utf8mb4&parseTime=True&loc=Asia%2FShanghai
      REDIS_DSN: redis://redis:6379/0
      REDIS_DB: '0'
      REDIS_TIMEOUT_SECONDS: '2'
      SESSION_SECRET: bmV3LWFwaS1waWxvdC1kZXYtc2Vzc2lvbi1zZWNyZXQtMjAyNg==
      ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      PLATFORM_BOOTSTRAP_ADMIN_PASSWORD: change-me
      SESSION_COOKIE_SECURE: 'false'
      PUBLIC_ORIGIN: http://localhost:5173
      TRUSTED_PROXIES: ''
      UPSTREAM_CA_FILE: ''
      DINGTALK_ALLOWED_HOSTS: ''
      METRICS_ALLOWED_CIDRS: 127.0.0.0/8,172.16.0.0/12
    volumes:
      - pilot_dev_exports:/data/exports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pilot-dev-network

  web:
    image: ${BUN_IMAGE:-docker.m.daocloud.io/oven/bun:1.3.13-alpine}
    container_name: new-api-pilot-dev-web
    restart: unless-stopped
    working_dir: /app
    command: ['sh', '-c', 'bun install --frozen-lockfile && bun run dev -- --host 0.0.0.0 --port 5173']
    ports:
      - '5173:5173'
    environment:
      VITE_API_SERVER_URL: http://api:3000
      NO_PROXY: localhost,127.0.0.1,::1,api,new-api-pilot-dev-api,mysql,redis
      no_proxy: localhost,127.0.0.1,::1,api,new-api-pilot-dev-api,mysql,redis
    volumes:
      - ./web:/app
      - ./testdata:/testdata:ro
      - pilot_dev_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:5173/ >/dev/null || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - pilot-dev-network

  mysql:
    image: ${MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.4}
    container_name: new-api-pilot-dev-mysql
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: new_api_pilot
      MYSQL_USER: pilot
      MYSQL_PASSWORD: pilot
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --transaction-isolation=READ-COMMITTED
    volumes:
      - pilot_dev_mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -upilot -ppilot --silent']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - pilot-dev-network

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: new-api-pilot-dev-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - pilot_dev_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - pilot-dev-network

volumes:
  pilot_dev_exports:
    name: new-api-pilot-dev-exports
  pilot_dev_mysql:
    name: new-api-pilot-dev-mysql
  pilot_dev_node_modules:
    name: new-api-pilot-dev_pilot_dev_node_modules
  pilot_dev_redis:
    name: new-api-pilot-dev-redis

networks:
  pilot-dev-network:
    driver: bridge
