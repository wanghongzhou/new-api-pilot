global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/recording-rules.yaml
  - /etc/prometheus/alert-rules.yaml

scrape_configs:
  - job_name: new-api-pilot
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - new-api-pilot:3000
  - job_name: new-api-pilot-infrastructure
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - node-exporter:9100
